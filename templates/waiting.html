{% extends "layout.html" %}

{% block content %}
<section class="container">
  <div class="row">
    <div class="column column-50 column-offset-25">
      <h2>ワードクラウド生成中...</h2>
      <p>トゥート履歴からワードクラウドを生成しています。<br>
      このページは自動で進行状況を確認し、完了後に結果ページへ移動します。</p>
      
      <div id="loading" class="loading">
        <p><i class="fa fa-spinner fa-spin"></i> 処理中...</p>
        <div class="progress-wrap" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-text" class="progress-text">0%</p>
      </div>
      
      <div id="error" class="error" style="display: none;">
        <p><strong>エラーが発生しました</strong></p>
        <p id="error-message"></p>
        <a href="{{ url_for('setting') }}" class="button">設定に戻る</a>
      </div>
    </div>
  </div>
</section>

<style>
.loading {
  text-align: center;
  padding: 2rem;
}

.loading p {
  font-size: 1.2rem;
  color: #666;
}

.progress-wrap {
  width: 100%;
  height: 12px;
  background: #e6e6e6;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 1rem;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #1976d2, #42a5f5);
  border-radius: 999px;
  transition: width 0.25s ease;
}

.progress-text {
  margin-top: 0.75rem;
  font-size: 0.9rem;
  color: #777;
  text-align: center;
}

.fa-spinner {
  font-size: 2rem;
  color: #1976d2;
}

.error {
  padding: 1.5rem;
  background-color: #ffebee;
  border-left: 4px solid #f44336;
  border-radius: 4px;
}

.error p {
  margin: 0.5rem 0;
  color: #c62828;
}

.error a {
  margin-top: 1rem;
  display: inline-block;
}
</style>

<script>
const taskId = "{{ task_id }}";
const checkInterval = 2000; // 2秒ごとにチェック

function updateProgress(progress, message, fetchedCount, totalCount) {
  let safeProgress = Math.max(0, Math.min(progress || 0, 100));
  if (totalCount > 0) {
    safeProgress = Math.max(0, Math.min((fetchedCount / totalCount) * 99, 99));
  }
  document.getElementById('progress-bar').style.width = `${safeProgress}%`;
  if (totalCount > 0) {
    const countText = `${fetchedCount}/${totalCount}`;
    if (message && message.includes(countText)) {
      document.getElementById('progress-text').textContent = message;
    } else {
      document.getElementById('progress-text').textContent = `${message} / 取得 ${countText}`;
    }
  } else {
    document.getElementById('progress-text').textContent = message || `${Math.floor(safeProgress)}%`;
  }
}

function checkStatus() {
  fetch(`/check-status/${taskId}`)
    .then(response => {
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      return response.json();
    })
    .then(data => {
      updateProgress(data.progress, data.message, data.fetched_count, data.total_count);

      if (data.status === 'completed') {
        updateProgress(100, '完了', data.fetched_count, data.total_count);
        // 完成！結果ページにリダイレクト
        window.location.href = `/result-view?filename=${encodeURIComponent(data.filename)}`;
      } else if (data.status === 'error') {
        showError(data.error === 'notext' ? 
          'テキストが見つかりません。別の設定で試してください。' : 
          `エラー: ${data.error}`);
      } else if (data.status === 'processing' || data.status === 'queued') {
        // 処理継続中 → 次のチェック
        setTimeout(checkStatus, checkInterval);
      } else {
        showError(`予期しない状態: ${data.status}`);
      }
    })
    .catch(error => {
      console.error('Error checking status:', error);
      showError(`通信エラー: ${error.message}`);
    });
}

function showError(message) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error-message').textContent = message;
}

// ページ読み込み時にチェック開始
document.addEventListener('DOMContentLoaded', function() {
  // 最初のチェックは少し遅延させる
  updateProgress(0, '待機中', 0, 0);
  setTimeout(checkStatus, 500);
});
</script>
{% endblock %}
